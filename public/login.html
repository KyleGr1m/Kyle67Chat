<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <style>
        body {
            background: linear-gradient(145deg, #d9e4ec, #cbdbe2);
            font-family: system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 48px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.1);
            width: 320px;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 60px;
        }
        button {
            background: #0b2b3b;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 60px;
            font-weight: bold;
            margin-top: 10px;
        }
        h2 { color: #0b2b3b; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>👑 Admin Access</h2>
        <form method="POST" action="/admin/login">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
